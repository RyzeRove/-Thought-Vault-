server {
    listen       80;
    server_name  localhost;
    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    http2        on;
    server_name  localhost;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # /api/ 代理 → NAS WebDAV HTTPS
    # 前端已构造完整路径 homes/<username>/thoughts/...，nginx 只透传
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass https://<your-nas-lan-ip>:<your-nas-webdav-https-port>;
        proxy_http_version 1.1;
        proxy_pass_request_headers on;
        proxy_ssl_verify off;
        proxy_read_timeout 30s;
    }

    # /mqtt WebSocket → Mosquitto WebSocket (9001)
    location /mqtt {
        proxy_pass http://mosquitto:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;  # 长连接不超时
        proxy_buffering off;
    }

    root   /usr/share/nginx/html;
    index  index.html;

    # index.html 禁用缓存
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.svg { expires 1d; }
    location /icons/ { expires 1y; add_header Cache-Control "public, immutable"; }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
}
