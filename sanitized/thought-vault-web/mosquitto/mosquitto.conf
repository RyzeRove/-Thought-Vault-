# Mosquitto MQTT Broker 配置
# 仅监听 Docker 内网 (1883 native / 9001 websocket)，不暴露公网
# WebSocket 端口由 nginx 反向代理（/mqtt → 9001）

listener 1883 0.0.0.0
protocol mqtt

listener 9001 0.0.0.0
protocol websockets

# 允许匿名连接（只有 Docker 内网可达，不暴露公网）
allow_anonymous true

# 持久化
persistence true
persistence_location /mosquitto/data/

# 日志
log_dest stdout
log_type all
